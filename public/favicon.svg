<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="arcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#0088CC"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0A0E1A" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>

  <!-- Outer decorative ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#arcGradient)" stroke-width="2" stroke-dasharray="6 4" filter="url(#glow)" opacity="0.5"/>

  <!-- Main arc reactor ring -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#00D4FF" stroke-width="3" filter="url(#glow)"/>

  <!-- Inner ring -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.6"/>

  <!-- Center core -->
  <circle cx="50" cy="50" r="10" fill="#00D4FF" filter="url(#glow)"/>

  <!-- Triangular cuts -->
  <polygon points="50,5 44,18 56,18" fill="#0A0E1A"/>
  <polygon points="50,95 44,82 56,82" fill="#0A0E1A"/>
  <polygon points="5,50 18,44 18,56" fill="#0A0E1A"/>
  <polygon points="95,50 82,44 82,56" fill="#0A0E1A"/>
  <polygon points="18.5,18.5 28,28 28,25" fill="#0A0E1A" transform="rotate(0 50 50)"/>

  <!-- Connection lines -->
  <line x1="50" y1="30" x2="50" y2="20" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="70" x2="50" y2="80" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="50" x2="20" y2="50" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
  <line x1="70" y1="50" x2="80" y2="50" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
</svg>
